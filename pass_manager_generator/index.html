<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="password-generator">
        <h2>Password Generator</h2>
<input type="text" id="password" readonly>
<button id="copyBtn">Copy</button>
<input type="number" id="length" value="12">

<div class="select-items">
    <div class="div1">
  <input class="upperCase" type="checkbox"> <span>Uppercase</span>
    </div>
    <div class="div2">
  <input class="lowerCase" type="checkbox"> <span>Lowercase</span> 
    </div>
    <div class="div3">
  <input class="num" type="checkbox">  <span>Number</span>

    </div>
    <div class="div4">
  <input class="sym" type="checkbox"> <span>Symbols </span>

    </div>

  <button class="generate">Generate</button>

</div>




    <script src="app.js"></script>
</body>
</html>
